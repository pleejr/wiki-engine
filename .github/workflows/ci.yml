name: engine-ci

# Gate engine changes before any vault adopts them: a broken engine HEAD would break
# every consuming vault's next `adopt`. Runs the same deterministic checks the tools
# ship with — no LLM, no `claude`, plain scripts only.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Shell syntax (bash -n)
        run: |
          for f in bin/*.sh adopt.d/*.sh; do
            [ -e "$f" ] || continue   # adopt.d/ may be absent/empty on older trees
            bash -n "$f"
          done

      - name: Python syntax (py_compile)
        run: python3 -m py_compile bin/*.py

      - name: Engine docs are soft-wrapped
        run: ./bin/reflow.sh --check $(find . -type d -name .git -prune -o \( -name '*.md' -o -name '*.tmpl' \) -print)

      - name: Usage docs cover all skills + no stale command refs
        run: ./bin/lint-docs.sh

      - name: Scaffolder + lint smoke test
        run: |
          git config --global user.email ci@example.com
          git config --global user.name CI
          git config --global protocol.file.allow always
          # Isolate settings so the wire/adopt path never mutates the real ~/.claude/settings.json.
          # ensure-hook keys the boot hook on WIKI_PATH; a throwaway vault would otherwise leave a
          # permanent, un-dedupable SessionStart hook. Keep this export when copying the recipe locally.
          export CLAUDE_SETTINGS="$RUNNER_TEMP/settings.json"
          VAULT="$RUNNER_TEMP/testvault"
          ./bin/new-wiki.sh --path "$VAULT" --boundary personal \
            --email ci@example.com --git-name CI --engine-url "$PWD" --no-link-skills --no-rag
          ./bin/lint.sh --wiki "$VAULT"
          ./bin/adopt.sh --check --wiki "$VAULT"
