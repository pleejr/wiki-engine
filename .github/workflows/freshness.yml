name: freshness

# Weekly automatic health check of the RAG layer's pinned deps
# (scaffold/rag-requirements.txt). Uses the same shared checker as doctor.sh, so
# "actionable" means the same thing in both places: a PINNED dep is behind, or
# pip-audit found a vulnerability anywhere in the tree. Transitive "newer available"
# is informational and never opens an issue. Deterministic, no `claude`.

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays 14:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  rag-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check RAG deps (pinned freshness + security)
        id: check
        run: |
          python -m pip install --quiet -r scaffold/rag-requirements.txt pip-audit
          set +e
          out="$(python bin/rag_deps_check.py --requirements scaffold/rag-requirements.txt)"
          code=$?
          set -e
          echo "$out"
          printf '%s\n' "$out" > check.txt
          {
            echo "## RAG dependency health"
            echo '```'
            echo "$out"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Open / refresh an issue only when actionable
        if: steps.check.outputs.code == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="RAG deps: action needed (update or security)"
          body="$(cat check.txt)

          Pinned bump: edit scaffold/rag-requirements.txt, then re-provision vaults with engine/bin/rag-setup.sh --force.
          Security: fix the flagged package(s) regardless of pin."
          existing="$(gh issue list --state open --search "$title in:title" --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
          else
            gh issue create --title "$title" --body "$body"
          fi
